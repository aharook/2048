<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Animated</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>2048</h1>
            <div class="score-container">
                <div>Рахунок: <span id="score">0</span></div>
            </div>
        </div>
        
        <div id="game-message" class="game-message hidden">
            <p id="message-text"></p>
            <button id="restart-btn">Спробувати ще</button>
        </div>

        <div class="grid">
            <div class="grid-bg" id="grid-bg"></div>
            <div id="tile-container"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
